<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>配達ルート作成</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="配達ルート">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" id="touch-icon">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #f5f5f5;
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 { font-size: 20px; margin-bottom: 16px; color: #333; }
    label { display: block; font-size: 15px; color: #666; margin-bottom: 4px; margin-top: 14px; }
    textarea, input, select {
      width: 100%; padding: 12px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 16px; background: #fff;
      touch-action: manipulation;
    }
    textarea { height: 160px; resize: vertical; }
    .btn {
      display: block; width: 100%; padding: 16px;
      margin-top: 10px; border: none; border-radius: 8px;
      font-size: 17px; font-weight: bold; cursor: pointer;
    }
    .btn-pin     { background: #4A90D9; color: white; }
    .btn-extract { background: #4A90D9; color: white; }
    .btn-log     { background: #E67E22; color: white; }
    .btn-route   { background: #27AE60; color: white; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .shops-box {
      width: 100%; min-height: 80px; padding: 12px;
      border: 1px solid #ddd; border-radius: 8px;
      font-size: 16px; background: #fff; white-space: pre-wrap;
    }
    .status {
      margin-top: 12px; padding: 12px; border-radius: 8px;
      font-size: 15px; display: none;
    }
    .status.loading { background: #FFF9C4; color: #856404; display: block; }
    .status.success { background: #D4EDDA; color: #155724; display: block; }
    .status.error   { background: #F8D7DA; color: #721C24; display: block; }
    .divider { margin: 16px 0; border-top: 1px solid #ddd; }
    #pinScreen, #mainScreen { }
    #mainScreen { display: none; }
  </style>
</head>
<body>

  <!-- PIN入力画面 -->
  <div id="pinScreen">
    <h1>🚚 配達ルート作成</h1>
    <label>PINを入力してください</label>
    <input type="password" id="pinInput" inputmode="numeric" maxlength="4" placeholder="0000">
    <button class="btn btn-pin" onclick="checkPin()">ログイン</button>
    <div class="status" id="pinStatus"></div>
  </div>

  <!-- メイン画面 -->
  <div id="mainScreen">
    <h1>🚚 配達ルート作成</h1>

    <label>① メッセージをペースト</label>
    <textarea id="message" placeholder="りくり / レッツ / カンパイ をキーワードに使用&#10;LINEやFacebookのメッセージを貼り付けてください"></textarea>
    <button class="btn btn-extract" id="extractBtn" onclick="extractShops()">店名を抽出する</button>

    <label>② 抽出された店名（編集可）</label>
    <div class="shops-box" id="shops" contenteditable="true"></div>

    <label>③ 出発日時（任意）</label>
    <div style="display:flex; gap:8px;">
      <input type="date" id="startDate" style="flex:1;">
      <input type="time" id="startTime" step="900" style="flex:1;">
    </div>

    <button class="btn btn-route" id="routeBtn" onclick="calcRoute()" disabled>ルートを計算する</button>

    <div class="divider"></div>

    <button class="btn btn-log" id="logBtn" onclick="writeLog()" disabled>📋 配達ログに書き込む</button>

    <div class="status" id="status"></div>
  </div>

  <script>
    // ▼ GASのデプロイURLをここに設定
    var GAS_URL = 'https://script.google.com/macros/s/AKfycby0Wx4nlnJL2mbvnjvkV3IODnWNnv-l6_2e_ZiSUmvp-_RVY0nHLrcNoOe8CrQEqA1o/exec';

    var sessionPin = '';

    // ホーム画面アイコン生成
    (function() {
      var canvas = document.createElement('canvas');
      canvas.width = 180; canvas.height = 180;
      var ctx = canvas.getContext('2d');
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.moveTo(30,0); ctx.lineTo(150,0);
      ctx.quadraticCurveTo(180,0,180,30);
      ctx.lineTo(180,150); ctx.quadraticCurveTo(180,180,150,180);
      ctx.lineTo(30,180); ctx.quadraticCurveTo(0,180,0,150);
      ctx.lineTo(0,30); ctx.quadraticCurveTo(0,0,30,0);
      ctx.fill();
      ctx.font = '110px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('🚚', 90, 130);
      document.getElementById('touch-icon').href = canvas.toDataURL('image/png');
    })();

    // PINをEnterキーでも送信
    document.getElementById('pinInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkPin();
    });

    function checkPin() {
      var pin = document.getElementById('pinInput').value.trim();
      if (!pin) return;
      var status = document.getElementById('pinStatus');
      status.className = 'status loading';
      status.textContent = '確認中...';

      callGas('checkPin', { pin: pin }, function(data) {
        if (data.success) {
          sessionPin = pin;
          sessionStorage.setItem('pin', pin);
          document.getElementById('pinScreen').style.display = 'none';
          document.getElementById('mainScreen').style.display = 'block';
        } else {
          status.className = 'status error';
          status.textContent = 'PINが違います';
        }
      }, function(err) {
        status.className = 'status error';
        status.textContent = 'エラー: ' + err;
      });
    }

    // セッションにPINが残っていれば自動ログイン
    (function() {
      var saved = sessionStorage.getItem('pin');
      if (saved) {
        sessionPin = saved;
        document.getElementById('pinScreen').style.display = 'none';
        document.getElementById('mainScreen').style.display = 'block';
      }
    })();

    function getStartTime() {
      var date = document.getElementById('startDate').value;
      var time = document.getElementById('startTime').value;
      if (!date || !time) return '';
      return date + 'T' + time;
    }

    function setStatus(type, msg) {
      var el = document.getElementById('status');
      el.className = 'status ' + type;
      el.textContent = msg;
    }

    function callGas(action, params, onSuccess, onError) {
      var body = Object.assign({ action: action, pin: sessionPin }, params);
      fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(body)
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) { onError(data.error); } else { onSuccess(data); }
      })
      .catch(function(err) { onError(err.message); });
    }

    function extractShops() {
      var message = document.getElementById('message').value.trim();
      if (!message) { setStatus('error', 'メッセージを入力してください'); return; }
      var btn = document.getElementById('extractBtn');
      btn.disabled = true;
      setStatus('loading', '店名を抽出中...');

      callGas('extractShops', { message: message }, function(data) {
        document.getElementById('shops').textContent = data.result;
        document.getElementById('routeBtn').disabled = false;
        document.getElementById('logBtn').disabled = false;
        setStatus('success', '店名を抽出しました。確認・編集してください。');
        btn.disabled = false;
      }, function(err) {
        setStatus('error', 'エラー: ' + err);
        btn.disabled = false;
      });
    }

    function calcRoute() {
      var shops = document.getElementById('shops').textContent.trim();
      if (!shops || shops === 'なし') { setStatus('error', '店名がありません'); return; }
      var btn = document.getElementById('routeBtn');
      btn.disabled = true;
      setStatus('loading', 'ルートを計算中...（1〜2分かかります）');

      callGas('calcRoute', { shops: shops, startTime: getStartTime() }, function(data) {
        if (data.success) {
          setStatus('success', '✅ ルート計算完了！planシートを確認してください。');
        } else {
          setStatus('error', 'エラー: ' + data.error);
        }
        btn.disabled = false;
      }, function(err) {
        setStatus('error', 'エラー: ' + err);
        btn.disabled = false;
      });
    }

    function writeLog() {
      var message = document.getElementById('message').value.trim();
      if (!message) { setStatus('error', 'メッセージを入力してください'); return; }
      var btn = document.getElementById('logBtn');
      btn.disabled = true;
      setStatus('loading', '配達ログに書き込み中...');

      callGas('writeLog', { message: message, startTime: getStartTime() }, function(data) {
        setStatus('success', '✅ ' + data.written + '行を配達ログに書き込みました。');
        btn.disabled = false;
      }, function(err) {
        setStatus('error', 'エラー: ' + err);
        btn.disabled = false;
      });
    }
  </script>
</body>
</html>
